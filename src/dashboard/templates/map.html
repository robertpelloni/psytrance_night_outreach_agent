<!DOCTYPE html>
<html>
<head>
    <title>Venue Map - Psytrance Outreach</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 700px; width: 100%; border-radius: 10px; }
        .vibe-high { color: #198754; font-weight: bold; }
        .vibe-mid { color: #ffc107; font-weight: bold; }
        .vibe-low { color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body class="container mt-5 text-bg-dark">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Venue Geographic Intelligence</h1>
        <div class="d-flex gap-2">
            <select id="vibe-filter" class="form-select form-select-sm bg-dark text-white border-secondary" style="width: 150px;">
                <option value="0">All Vibes</option>
                <option value="8">High Vibe (8+)</option>
                <option value="6">Mid Vibe (6+)</option>
            </select>
            <select id="status-filter" class="form-select form-select-sm bg-dark text-white border-secondary" style="width: 150px;">
                <option value="ALL">All Status</option>
                <option value="PENDING_REVIEW">Pending Review</option>
                <option value="SENT">Sent</option>
                <option value="APPROVED">Approved</option>
            </select>
            <button onclick="toggleClusters()" id="cluster-toggle" class="btn btn-sm btn-outline-info">Show Hotspots</button>
            <button onclick="planCircuit()" id="circuit-btn" class="btn btn-sm btn-outline-warning">Plan Midwest Circuit</button>

            <a href="/" class="btn btn-sm btn-outline-primary">Dashboard</a>
        </div>
    </div>

    <div class="card bg-dark border-secondary shadow mb-4">
        <div class="card-body p-0">
            <div id="map"></div>
        </div>
    </div>

    <!-- Tour Planning Modal -->
    <div class="modal fade" id="tourModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white border-info">
                <div class="modal-header border-info">
                    <h5 class="modal-title">AI Regional Tour Orchestrator</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h6>Optimized Itinerary & Strategy:</h6>
                    <pre id="tour-output" class="bg-black text-info p-3 rounded" style="white-space: pre-wrap; font-size: 0.9rem;"></pre>

                    <h6 class="mt-4">Unified Cluster Residency Pitch:</h6>
                    <textarea id="cluster-pitch" class="form-control bg-black text-white border-secondary mb-3" rows="10"></textarea>

                    <div id="dispatch-results" class="alert d-none"></div>
                </div>
                <div class="modal-footer border-info">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="dispatch-btn" class="btn btn-info">Dispatch Tour Pitch to Cluster</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const map = L.map('map').setView([42.3314, -83.0458], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            className: 'map-tiles'
        }).addTo(map);

        const venues = {{ venues|tojson }};
        const clusters = {{ clusters|tojson }};
        let activeMarkers = [];
        let clusterMarkers = [];
        let clustersVisible = false;

        function updateMap() {
            // Clear existing markers
            activeMarkers.forEach(m => map.removeLayer(m));
            activeMarkers = [];

            const vibeThreshold = parseInt(document.getElementById('vibe-filter').value);
            const statusFilter = document.getElementById('status-filter').value;

            venues.forEach(venue => {
                if (venue.latitude && venue.longitude) {
                    if (venue.vibe_score < vibeThreshold) return;
                    if (statusFilter !== 'ALL' && venue.pipeline_status !== statusFilter) return;

                    let vibeClass = 'vibe-mid';
                    if (venue.vibe_score >= 8) vibeClass = 'vibe-high';
                    if (venue.vibe_score < 6) vibeClass = 'vibe-low';

                    const marker = L.circleMarker([venue.latitude, venue.longitude], {
                        radius: 8,
                        fillColor: venue.vibe_score >= 8 ? "#198754" : (venue.vibe_score >= 6 ? "#ffc107" : "#0d6efd"),
                        color: "#fff",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map);

                    marker.bindPopup(`
                        <div class="text-dark">
                            <h6 class="mb-1">${venue.name}</h6>
                            <p class="mb-1 small text-muted">${venue.city} (${venue.pipeline_status})</p>
                            <div class="${vibeClass}">Vibe Score: ${venue.vibe_score}/10</div>
                            <hr class="my-1">
                            <a href="/" class="btn btn-sm btn-primary py-0 px-2 mt-1">Review Lead</a>
                        </div>
                    `);
                    activeMarkers.push(marker);
                }
            });
        }

        function dispatchTour(clusterIdx) {
            const pitch = document.getElementById('cluster-pitch').value;
            const btn = document.getElementById('dispatch-btn');
            const alertDiv = document.getElementById('dispatch-results');

            btn.disabled = true;
            btn.innerText = 'Dispatching...';

            fetch(`/dispatch_tour/${clusterIdx}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pitch: pitch })
            })
            .then(r => r.json())
            .then(data => {
                alertDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
                alertDiv.classList.add(data.success > 0 ? 'alert-success' : 'alert-danger');
                alertDiv.innerText = `Successfully dispatched to ${data.success} venues. Failures: ${data.failure}.`;
                btn.innerText = 'Dispatch Complete';
            })
            .catch(err => {
                alertDiv.classList.remove('d-none');
                alertDiv.classList.add('alert-danger');
                alertDiv.innerText = "Error dispatching tour: " + err;
                btn.disabled = false;
                btn.innerText = 'Retry Dispatch';
            });
        }

        let circuitPolyline = null;


        function dispatchCircuit() {
            const pitch = document.getElementById('cluster-pitch').value;
            const btn = document.getElementById('dispatch-btn');
            const alertDiv = document.getElementById('dispatch-results');

            btn.disabled = true;
            btn.innerText = 'Dispatching Circuit...';

            fetch(`/dispatch_circuit`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pitch: pitch })
            })
            .then(r => r.json())
            .then(data => {
                alertDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
                alertDiv.classList.add(data.success > 0 ? 'alert-success' : 'alert-danger');
                alertDiv.innerText = `Successfully dispatched to ${data.success} venues across the circuit. Failures: ${data.failure}.`;
                btn.innerText = 'Dispatch Complete';
            })
            .catch(err => {
                alertDiv.classList.remove('d-none');
                alertDiv.classList.add('alert-danger');
                alertDiv.innerText = "Error dispatching circuit: " + err;
                btn.disabled = false;
                btn.innerText = 'Retry Dispatch';
            });
        }

        function planCircuit() {
            const btn = document.getElementById('circuit-btn');
            btn.disabled = true;
            btn.innerText = 'Calculating Route...';

            fetch(`/plan_circuit`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('tour-output').innerText = data.recommendation;
                    document.getElementById('cluster-pitch').value = "Circuit routing active. View strategy above.";
                    document.getElementById('dispatch-btn').classList.remove('d-none');
                    document.getElementById('dispatch-btn').onclick = () => dispatchCircuit();


                    if (data.route && data.route.length > 1) {
                        const latlngs = data.route.map(c => [c.center.lat, c.center.lon]);
                        if (circuitPolyline) map.removeLayer(circuitPolyline);
                        circuitPolyline = L.polyline(latlngs, {color: 'orange', weight: 4, dashArray: '10, 10'}).addTo(map);
                        map.fitBounds(circuitPolyline.getBounds());
                    }

                    const modal = new bootstrap.Modal(document.getElementById('tourModal'));
                    modal.show();
                    btn.disabled = false;
                    btn.innerText = 'Plan Midwest Circuit';
                })
                .catch(err => {
                    alert("Error calculating circuit: " + err);
                    btn.disabled = false;
                    btn.innerText = 'Plan Midwest Circuit';
                });
        }

        function toggleClusters() {
            clustersVisible = !clustersVisible;
            const btn = document.getElementById('cluster-toggle');

            if (clustersVisible) {
                btn.innerText = 'Hide Hotspots';
                btn.classList.replace('btn-outline-info', 'btn-info');
                clusters.forEach(c => {
                    const circle = L.circle([c.center.lat, c.center.lon], {
                        color: '#0dcaf0',
                        fillColor: '#0dcaf0',
                        fillOpacity: 0.2,
                        radius: 50000 // 50km
                    }).addTo(map);
                    circle.bindTooltip(`Hotspot: ${c.venue_count} venues, Avg Vibe: ${c.avg_vibe.toFixed(1)}`, { permanent: false, direction: 'top' });
                    circle.on('click', () => {
                        const clusterIdx = clusters.indexOf(c);
                        fetch(`/plan_tour/${clusterIdx}`)
                            .then(r => r.json())
                            .then(data => {
                                document.getElementById('tour-output').innerText = data.recommendation;
                                document.getElementById('cluster-pitch').value = data.pitch;
                                document.getElementById('dispatch-btn').onclick = () => dispatchTour(clusterIdx);
                                const modal = new bootstrap.Modal(document.getElementById('tourModal'));
                                modal.show();
                            });
                    });
                    clusterMarkers.push(circle);
                });
            } else {
                btn.innerText = 'Show Hotspots';
                btn.classList.replace('btn-info', 'btn-outline-info');
                clusterMarkers.forEach(m => map.removeLayer(m));
                clusterMarkers = [];
            }
        }

        document.getElementById('vibe-filter').addEventListener('change', updateMap);
        document.getElementById('status-filter').addEventListener('change', updateMap);

        updateMap();

        if (activeMarkers.length > 0) {
            const group = new L.featureGroup(activeMarkers);
            map.fitBounds(group.getBounds().pad(0.1));
        }
    </script>
</body>
</html>
