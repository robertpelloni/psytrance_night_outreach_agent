<!DOCTYPE html>
<html>
<head>
    <title>Manage Sources - Psytrance Outreach</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5 text-bg-dark">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Manage Scraper Sources</h1>
        <a href="/" class="btn btn-outline-primary">Back to Dashboard</a>
    </div>

    <div class="card text-bg-secondary mb-5">
        <div class="card-header bg-dark text-white"><h5>Add New Scraper Source</h5></div>
        <div class="card-body">
            <form action="/add_source" method="post">
                <div class="mb-3">
                    <label class="form-label">Source Name (e.g., Eventbrite Detroit)</label>
                    <input type="text" name="name" class="form-control bg-dark text-white border-secondary" placeholder="Eventbrite Detroit" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Example URL to Analyze</label>
                    <input type="url" name="url" class="form-control bg-dark text-white border-secondary" placeholder="https://www.eventbrite.com/d/mi--detroit/electronic-music/" required>
                </div>
                <button type="submit" class="btn btn-success">Generate Scraper via AI</button>
            </form>
        </div>
    </div>

    <h3 class="mb-3">Active Scrapers</h3>
    <ul class="list-group">
        {% for file in files %}
        <li class="list-group-item text-bg-dark border-secondary d-flex justify-content-between align-items-center">
            {{ file }}
            <span class="badge bg-success">Active</span>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
