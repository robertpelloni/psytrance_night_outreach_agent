<!DOCTYPE html>
<html>
<head>
    <title>Settings - Psytrance Outreach</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5 text-bg-dark">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Project Settings</h1>
        <a href="/" class="btn btn-outline-primary">Back to Dashboard</a>
    </div>

    <form action="/settings" method="post" class="card text-bg-secondary p-4 shadow">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Target Cities (comma separated)</label>
                <input type="text" name="cities" class="form-control bg-dark text-white border-secondary" value="{{ config.cities | join(', ') }}">
                <div class="form-text text-light">Pipeline will hunt for venues in these cities.</div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Target Genres (comma separated)</label>
                <input type="text" name="genres" class="form-control bg-dark text-white border-secondary" value="{{ config.target_genres | join(', ') }}">
                <div class="form-text text-info">The first genre listed is the <strong>Active Genre</strong> for the autonomous hunt.</div>
            </div>
        </div>

        <hr class="border-secondary my-4">

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Electronic Press Kit (EPK) Link</label>
                <input type="url" name="epk_link" class="form-control bg-dark text-white border-secondary" value="{{ config.epk_link }}">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Showcase Mix Link (SoundCloud/Mixcloud)</label>
                <input type="url" name="mix_link" class="form-control bg-dark text-white border-secondary" value="{{ config.mix_link }}">
            </div>
        </div>

        <div class="mb-3 w-25">
            <label class="form-label">Vibe Score Threshold (1-10)</label>
            <input type="number" name="vibe_threshold" class="form-control bg-dark text-white border-secondary" min="1" max="10" value="{{ config.vibe_threshold }}">
            <div class="form-text text-light">Leads below this score are auto-filtered.</div>
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success px-5">Save Configurations</button>
        </div>
    </form>
</body>
</html>
