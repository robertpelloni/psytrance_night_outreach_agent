<!DOCTYPE html>
<html>
<head>
    <title>Psytrance Outreach Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h1>Pending Outreach Leads</h1>
    <div class="row mt-4">
        {% for lead in leads %}
        <div class="col-12 mb-4">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">{{ lead.name }} ({{ lead.city }})</h5>
                    <span class="badge bg-primary">Score: {{ lead.vibe_score }}/10</span>
                </div>
                <div class="card-body">
                    <p><strong>Justification:</strong> {{ lead.qualification_justification }}</p>
                    <div class="mb-3">
                        <label class="form-label"><strong>Generated Pitch:</strong></label>
                        <textarea class="form-control" rows="5">{{ lead.generated_pitch }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <form action="{{ url_for('approve', lead_id=lead.id) }}" method="post">
                            <button type="submit" class="btn btn-success">Approve & Send</button>
                        </form>
                        <form action="{{ url_for('reject', lead_id=lead.id) }}" method="post">
                            <button type="submit" class="btn btn-danger">Reject</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
        {% if not leads %}
        <div class="col-12">
            <div class="alert alert-info">No pending leads to review.</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
