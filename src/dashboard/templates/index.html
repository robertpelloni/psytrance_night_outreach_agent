<!DOCTYPE html>
<html>
<head>
    <title>Psytrance Outreach Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script>
        async function regeneratePitch(leadId) {
            const btn = document.getElementById(`regen-btn-${leadId}`);
            const textarea = document.getElementById(`pitch-${leadId}`);
            const originalText = btn.innerText;

            btn.disabled = true;
            btn.innerText = 'Regenerating...';

            try {
                const response = await fetch(`/regenerate/${leadId}`, { method: 'POST' });
                const data = await response.json();
                if (data.pitch) {
                    textarea.value = data.pitch;
                } else {
                    alert('Error regenerating pitch: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error: ' + error);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    </script>
</head>
<body class="container mt-5 text-bg-dark">
    <h1 class="mb-4">Psytrance Outreach: Pending Leads</h1>
    <div class="row mt-4">
        {% for lead in leads %}
        <div class="col-12 mb-4">
            <div class="card text-bg-secondary">
                <div class="card-header d-flex justify-content-between align-items-center bg-dark text-white">
                    <h5 class="mb-0">{{ lead.name }} ({{ lead.city }})</h5>
                    <span class="badge {% if lead.vibe_score >= 8 %}bg-success{% else %}bg-primary{% endif %}">
                        Vibe Score: {{ lead.vibe_score }}/10
                    </span>
                </div>
                <div class="card-body">
                    <p class="card-text"><strong>Why:</strong> {{ lead.qualification_justification }}</p>
                    <form action="{{ url_for('approve', lead_id=lead.id) }}" method="post">
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-end mb-2">
                                <label class="form-label mb-0"><strong>Customized Pitch:</strong></label>
                                <button type="button" id="regen-btn-{{ lead.id }}"
                                        onclick="regeneratePitch({{ lead.id }})"
                                        class="btn btn-sm btn-outline-info">
                                    Regenerate AI Pitch
                                </button>
                            </div>
                            <textarea id="pitch-{{ lead.id }}" name="pitch" class="form-control bg-dark text-white border-secondary" rows="8">{{ lead.generated_pitch }}</textarea>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success px-4">Approve & Send Email</button>
                    </form>
                    <form action="{{ url_for('reject', lead_id=lead.id) }}" method="post">
                        <button type="submit" class="btn btn-outline-danger">Reject</button>
                    </form>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
        {% if not leads %}
        <div class="col-12">
            <div class="alert alert-info bg-dark text-info border-info">No pending leads to review. Keep hunting!</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
