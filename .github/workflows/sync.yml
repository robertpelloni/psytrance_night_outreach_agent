name: Repository Sync

on:
  push:
    branches:
      - '**' # Trigger on every branch to ensure continuous synchronization
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Run Master Integrity Suite (Pytest)
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python3 -m pytest

      - name: Run Sync Script (Start Protocol)
        run: |
          # If on a feature branch, run sync and tests, but skip the full outreach pipeline to save tokens
          if [[ "${{ github.ref }}" != "refs/heads/main" && "${{ github.event_name }}" != "schedule" ]]; then
            echo "Feature branch detected. Running sync and tests only."
            python3 sync_repo.py
          else
            echo "Main branch or Schedule detected. Running full protocol."
            ./start.sh
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
