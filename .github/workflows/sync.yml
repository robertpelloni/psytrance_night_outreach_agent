name: Repository Sync

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Run Application Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python tests/test_db_manager.py
          python tests/test_ai_engine.py
          python tests/test_protocol_e2e.py
          python tests/test_autonomous_dev_e2e.py

      - name: Run Sync Tests
        run: cd scripts && python test_sync_repo.py

      - name: Run Sync Script (Start Protocol)
        run: ./scripts/start.sh
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROXY_LIST: ${{ secrets.PROXY_LIST }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
